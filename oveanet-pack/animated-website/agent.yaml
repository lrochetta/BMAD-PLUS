name: animated-website
version: 1.0.0
title: "Animated Website"
description: "Convertit des vidéos MP4 en sites web animés de luxe avec scroll frame-by-frame"
author: Laurent ROCHETTA  AI
icon: "🎬"
tags: [animation, scroll, video, luxury, canvas, webp]
triggers:
  - "animated website"
  - "scroll animation"
  - "video to website"
  - "Apple-style page"
  - "scroll-driven site"
  - "frame animation"
  - "site animé"
requires:
  tools:
    - name: ffmpeg
      install:
        windows: "winget install FFmpeg"
        mac: "brew install ffmpeg"
        linux: "sudo apt install ffmpeg"
    - name: python3
      install:
        windows: "winget install Python.Python.3"
        mac: "brew install python3"
        linux: "sudo apt install python3"
  scripts:
    - "scripts/extract_frames.py"
commands: []
workflow:
  - step: 1
    name: "Analyze Video"
    tool: "ffprobe"
  - step: 2
    name: "Extract Frames"
    tool: "extract_frames.py"
  - step: 3
    name: "Prepare Content"
    tool: "agent"
  - step: 4
    name: "Generate HTML"
    tool: "agent"
  - step: 5
    name: "Preview"
    tool: "python http.server"
platforms:
  bmad:
    target: "_bmad/core/agents/"
    file: "animated-website-agent.md"
  claude:
    target: ".claude/skills/"
    skillName: "animated-website"
    includeScripts: true
  gemini:
    target: ".agent/workflows/"
    file: "animated-website.md"
  opencode:
    target: ".opencode/agents/"
    file: "animated-website.md"
  codex:
    target: ".codex/agents/"
    file: "animated-website.md"
