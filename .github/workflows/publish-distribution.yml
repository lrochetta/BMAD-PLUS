name: Publish to Distribution Repo

# Triggered when a version tag is pushed (e.g. v0.4.0)
on:
  push:
    tags:
      - 'v*'

# Can also be triggered manually from GitHub UI
  workflow_dispatch:
    inputs:
      force:
        description: 'Force push to distribution'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  publish-distribution:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Golden Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Get version from tag
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT
          fi
          echo "📦 Version: ${{ steps.version.outputs.VERSION || 'reading...' }}"

      # ── SCRUBBING — Remove private directories ──────────────────
      - name: Scrub private directories
        run: |
          echo "🧹 Scrubbing private directories..."
          rm -rf monitor/               # VPS infrastructure
          rm -rf mcp-server/             # Private MCP server
          rm -rf secrets/                # API keys, tokens
          rm -rf oveanet-pack/           # Private project (SEO Engine, etc.)
          rm -rf .venv/
          rm -rf .pytest_cache/
          rm -rf node_modules/
          rm -rf '%TEMP%'/
          rm -rf .github/                # Don't copy CI/CD to public
          rm -rf .agents/                # Don't copy agent workflows
          rm -rf docs/architecture/      # Private architecture docs
          echo "✅ Private directories removed"

      # ── SANITIZATION — Swap READMEs ─────────────────────────────
      - name: Swap README for distribution
        run: |
          echo "📝 Swapping README..."
          if [ -f "README-DIST.md" ]; then
            mv README.md README-GOLDEN.md  # Backup (won't be pushed)
            mv README-DIST.md README.md
            echo "✅ README-DIST.md → README.md"
          else
            echo "⚠️ README-DIST.md not found, keeping original"
          fi

      # ── SANITIZATION — Remove golden-only files ─────────────────
      - name: Remove golden-only files
        run: |
          echo "🧹 Removing golden-only files..."
          rm -f README-GOLDEN.md
          rm -f CLAUDE.md          # IDE-specific config
          rm -f GEMINI.md          # IDE-specific config
          rm -f AGENTS.md          # IDE-specific config
          rm -f process-info.md    # Development notes
          echo "✅ Golden-only files removed"

      # ── PUSH to Distribution Repo ───────────────────────────────
      - name: Push to Distribution Repo
        env:
          DIST_PAT: ${{ secrets.DISTRIBUTION_PAT }}
        run: |
          echo "🚀 Pushing to distribution repo..."

          # Configure git identity
          git config user.name "Laurent Rochetta"
          git config user.email "lrochetta@users.noreply.github.com"

          # Remove any credential helpers injected by actions/checkout
          git config --unset-all http.https://github.com/.extraheader || true

          # Stage all remaining (clean) files
          git add -A
          git commit -m "Release v${{ steps.version.outputs.VERSION }} — automated distribution build" --allow-empty

          # Push to distribution repo using classic PAT auth
          git remote add distribution https://${DIST_PAT}@github.com/lrochetta/BMAD-PLUS.git
          git push distribution HEAD:master --force

          echo "✅ Distribution repo updated!"

      # ── NPM SETUP ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # ── NPM PUBLISH ──────────────────────────────────────────────
      - name: Publish to npm
        continue-on-error: true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          echo "📦 Publishing to npm..."
          npm publish --access public 2>&1 || echo "⚠️ npm publish failed — check token permissions"
          echo "npm publish step completed"
