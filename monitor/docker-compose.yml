# BMAD+ Monitor — Docker Compose
# Runs Evolution API for WhatsApp notifications

services:
  evolution-api:
    image: atendai/evolution-api:latest
    container_name: bmad-plus-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
    volumes:
      - evolution_data:/evolution/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  evolution_data:
