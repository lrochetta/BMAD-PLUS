# BMAD+ Monitor Configuration
# Copy this file to config.yaml and fill in your values.

# Gemini API for AI-powered diff analysis
gemini_api_key: "YOUR_GEMINI_API_KEY"

# WhatsApp notifications via Evolution API
whatsapp:
  enabled: true
  evolution_api_url: "http://localhost:8080"
  api_key: "YOUR_EVOLUTION_API_KEY"
  instance_name: "bmad-monitor"
  phone_number: "41XXXXXXXXX"  # Your number with country code

# Email fallback (optional)
fallback_email:
  smtp_host: "smtp.gmail.com"
  smtp_port: 587
  username: "your-email@gmail.com"
  password: "your-app-password"
  from_addr: "your-email@gmail.com"
  to_addr: "your-email@gmail.com"

# Cron schedule (for reference — configure in system crontab)
# 0 9 * * 1 cd /path/to/BMAD+/monitor && python3 weekly-check.py >> /var/log/bmad-monitor.log 2>&1
